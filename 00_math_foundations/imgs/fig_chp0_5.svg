<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="800" viewBox="0 0 1600 800" role="img" aria-labelledby="title desc">
  <title id="title">From a second-order differential equation to state-space form</title>
  <desc id="desc">Three-step diagram showing an original second-order mass-spring-damper equation, the definition of two states, and the resulting first-order state-space equations.</desc>
  <defs>
<filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#D8DEE6" flood-opacity="0.55"/>
    </filter>
    <style>
      .font { font-family: Arial, Helvetica, sans-serif; }
      .title { font-size: 34px; font-weight: 700; fill: #2E8B57; }
      .card-title { font-size: 31px; font-weight: 700; }
      .eq { font-size: 30px; font-weight: 500; }
      .caption { font-size: 23px; font-weight: 400; }
      .note { font-size: 24px; font-weight: 500; fill: #C73545; }
      .footer { font-size: 16px; fill: #7A7A7A; }
    </style>
  </defs>

  <!-- Transparent background -->

  <!-- Title -->
  <rect x="150" y="30" width="1300" height="105" rx="22" fill="#FFFFFF" stroke="#2E8B57" stroke-width="4" filter="url(#shadow)"/>
  <text class="font title" x="800" y="95" text-anchor="middle">From a second-order differential equation to state-space form</text>

  <!-- Card 1 -->
  <rect x="50" y="190" width="430" height="380" rx="22" fill="#EAF4FB" stroke="#123B61" stroke-width="4" filter="url(#shadow)"/>
  <text class="font card-title" x="265" y="255" text-anchor="middle" fill="#123B61">1. Original model</text>
  <text class="font eq" x="265" y="350" text-anchor="middle" fill="#123B61">
    <tspan x="265" dy="0">m d²x/dt² + c dx/dt</tspan>
    <tspan x="265" dy="48">+ kx = u(t)</tspan>
  </text>
  <text class="font caption" x="265" y="500" text-anchor="middle" fill="#123B61">second-order dynamics</text>

  <!-- Arrow 1 -->
  <line x1="505" y1="380" x2="542" y2="380" stroke="#5A6472" stroke-width="8" stroke-linecap="round"/>
  <path d="M540 369 L559 380 L540 391 L545 380 Z" fill="#5A6472"/>

  <!-- Card 2 -->
  <rect x="585" y="190" width="430" height="380" rx="22" fill="#FFF4E8" stroke="#D97300" stroke-width="4" filter="url(#shadow)"/>
  <text class="font card-title" x="800" y="255" text-anchor="middle" fill="#D97300">2. Define states</text>
  <text class="font eq" x="800" y="350" text-anchor="middle" fill="#D97300">
    <tspan x="800" dy="0">x₁ = x</tspan>
    <tspan x="800" dy="56">x₂ = dx/dt</tspan>
  </text>
  <text class="font caption" x="800" y="485" text-anchor="middle" fill="#D97300">
    <tspan x="800" dy="0">replace one second-order equation</tspan>
    <tspan x="800" dy="32">with two state variables</tspan>
  </text>

  <!-- Arrow 2 -->
  <line x1="1040" y1="380" x2="1077" y2="380" stroke="#5A6472" stroke-width="8" stroke-linecap="round"/>
  <path d="M1075 369 L1094 380 L1075 391 L1080 380 Z" fill="#5A6472"/>

  <!-- Card 3 -->
  <rect x="1120" y="190" width="430" height="380" rx="22" fill="#EAF7EE" stroke="#2E8B57" stroke-width="4" filter="url(#shadow)"/>
  <text class="font card-title" x="1335" y="255" text-anchor="middle" fill="#2E8B57">3. First-order form</text>
  <text class="font eq" x="1335" y="345" text-anchor="middle" fill="#2E8B57">
    <tspan x="1335" dy="0">dx₁/dt = x₂</tspan>
    <tspan x="1335" dy="54">dx₂/dt = -(k/m)x₁</tspan>
    <tspan x="1335" dy="44">-(c/m)x₂ + u/m</tspan>
  </text>
  <text class="font caption" x="1335" y="510" text-anchor="middle" fill="#2E8B57">
    <tspan x="1335" dy="0">state-space form used for</tspan>
    <tspan x="1335" dy="32">control and optimization</tspan>
  </text>

  <!-- Bottom note -->
  <rect x="185" y="625" width="1230" height="105" rx="20" fill="#FFF1F3" stroke="#C73545" stroke-width="4" filter="url(#shadow)"/>
  <text class="font note" x="800" y="668" text-anchor="middle">
    <tspan x="800" dy="0">State-space form is central because CCD, feedback control, and numerical optimal control</tspan>
    <tspan x="800" dy="34">are usually expressed using first-order dynamics.</tspan>
  </text>

  <text class="font footer" x="65" y="780">Chapter 0 prerequisite foundations</text>
</svg>
