<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1050" role="img" aria-labelledby="title desc">
  <title id="title">Learning Control Co-Design</title>
  <desc id="desc">An iterative four-stage learning cycle connects physical reasoning, formulation, computation, and interpretation. A checklist advises students to identify decisions, predict coupling, reproduce examples, check units and convergence, explain design changes, and test beyond the optimum. A final reminder says that a converged optimization is only the beginning.</desc>
  <defs>
    <linearGradient id="navy" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#00274c"/><stop offset="1" stop-color="#004780"/></linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#007d7a"/><stop offset="1" stop-color="#11a6a0"/></linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#d99a00"/><stop offset="1" stop-color="#f3bd18"/></linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#0757a6"/><stop offset="1" stop-color="#1679df"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="5" stdDeviation="8" flood-color="#00274c" flood-opacity="0.16"/></filter>
    <marker id="arrowNavy" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="9" markerHeight="9" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#003f78"/></marker>
    <marker id="arrowTeal" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="9" markerHeight="9" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#008b88"/></marker>
    <marker id="arrowGold" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="9" markerHeight="9" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#d69a00"/></marker>
    <style>
      .title { font-family: Arial, Helvetica, sans-serif; font-size: 62px; font-weight: 700; fill: #00274c; }
      .subtitle { font-family: Arial, Helvetica, sans-serif; font-size: 32px; font-weight: 500; fill: #242b31; }
      .card-label { font-family: Arial, Helvetica, sans-serif; font-size: 28px; font-weight: 700; fill: #fff; }
      .num { font-family: Arial, Helvetica, sans-serif; font-size: 31px; font-weight: 700; fill: #00274c; }
      .iterate { font-family: Arial, Helvetica, sans-serif; font-size: 42px; font-weight: 700; fill: #00274c; }
      .panel-title { font-family: Arial, Helvetica, sans-serif; font-size: 31px; font-weight: 700; fill: #fff; }
      .item { font-family: Arial, Helvetica, sans-serif; font-size: 22px; font-weight: 500; fill: #101923; }
      .callout { font-family: Arial, Helvetica, sans-serif; font-size: 34px; font-weight: 700; fill: #00274c; }
    </style>
  </defs>

  <rect width="1400" height="1050" fill="#fff"/>
  <text x="700" y="86" class="title" text-anchor="middle">Learning Control Co-Design</text>
  <text x="700" y="142" class="subtitle" text-anchor="middle">Do not treat the solver as a black box.</text>

  <!-- Iterative learning cycle. -->
  <path d="M664 278C736 289 783 333 792 405" fill="none" stroke="#003f78" stroke-width="6" marker-end="url(#arrowNavy)"/>
  <path d="M790 603C783 674 736 719 664 732" fill="none" stroke="#008b88" stroke-width="6" marker-end="url(#arrowTeal)"/>
  <path d="M344 732C271 718 224 674 218 603" fill="none" stroke="#d69a00" stroke-width="6" marker-end="url(#arrowGold)"/>
  <path d="M219 405C228 333 274 289 346 278" fill="none" stroke="#1465bb" stroke-width="6" marker-end="url(#arrowNavy)"/>

  <!-- Physical reasoning. -->
  <g filter="url(#shadow)">
    <rect x="348" y="185" width="315" height="190" rx="25" fill="url(#navy)"/>
    <circle cx="396" cy="235" r="32" fill="#fff"/>
    <text x="396" y="246" class="num" text-anchor="middle">1</text>
    <circle cx="535" cy="251" r="38" fill="none" stroke="#fff" stroke-width="6"/>
    <circle cx="535" cy="251" r="13" fill="none" stroke="#fff" stroke-width="6"/>
    <path d="M535 203v16M535 283v16M487 251h16M567 251h16M501 217l12 12M557 273l12 12M569 217l-12 12M513 273l-12 12" stroke="#fff" stroke-width="6" stroke-linecap="round"/>
    <text x="505" y="342" class="card-label" text-anchor="middle">Physical reasoning</text>
  </g>

  <!-- Formulation. -->
  <g filter="url(#shadow)">
    <rect x="660" y="420" width="260" height="185" rx="25" fill="url(#teal)"/>
    <circle cx="708" cy="469" r="32" fill="#fff"/>
    <text x="708" y="480" class="num" text-anchor="middle">2</text>
    <path d="M790 460l48-27 48 27v58l-48 28-48-28zM790 460l48 29 48-29M838 489v57" fill="none" stroke="#fff" stroke-width="6" stroke-linejoin="round"/>
    <text x="790" y="575" class="card-label" text-anchor="middle">Formulation</text>
  </g>

  <!-- Computation. -->
  <g filter="url(#shadow)">
    <rect x="350" y="683" width="315" height="185" rx="25" fill="url(#gold)"/>
    <circle cx="398" cy="732" r="32" fill="#fff"/>
    <text x="398" y="743" class="num" text-anchor="middle">3</text>
    <rect x="475" y="715" width="88" height="62" rx="5" fill="none" stroke="#fff" stroke-width="6"/>
    <path d="M459 795h120M483 777l-10 18M555 777l10 18M492 759l18-18 18 10 20-23" fill="none" stroke="#fff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="492" cy="759" r="5" fill="#fff"/><circle cx="510" cy="741" r="5" fill="#fff"/><circle cx="528" cy="751" r="5" fill="#fff"/><circle cx="548" cy="728" r="5" fill="#fff"/>
    <text x="507" y="840" class="card-label" text-anchor="middle">Computation</text>
  </g>

  <!-- Interpretation. -->
  <g filter="url(#shadow)">
    <rect x="90" y="420" width="260" height="185" rx="25" fill="url(#blue)"/>
    <circle cx="138" cy="469" r="32" fill="#fff"/>
    <text x="138" y="480" class="num" text-anchor="middle">4</text>
    <path d="M185 525v-30h22v30M218 525v-50h22v50M251 525v-69h22v69M178 536h105M186 465l30-26 20 10 35-38" fill="none" stroke="#fff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="268" cy="516" r="24" fill="none" stroke="#fff" stroke-width="6"/><path d="M285 533l22 23" stroke="#fff" stroke-width="7" stroke-linecap="round"/>
    <text x="220" y="575" class="card-label" text-anchor="middle">Interpretation</text>
  </g>

  <g>
    <circle cx="505" cy="520" r="104" fill="#fff" stroke="#d1d8df" stroke-width="5"/>
    <path d="M450 478a73 73 0 0 1 109 8" fill="none" stroke="#b9c2cc" stroke-width="6" marker-end="url(#arrowNavy)"/>
    <path d="M560 558a73 73 0 0 1-109-8" fill="none" stroke="#b9c2cc" stroke-width="6" marker-end="url(#arrowNavy)"/>
    <text x="505" y="531" class="iterate" text-anchor="middle">Iterate</text>
  </g>

  <!-- Chapter checklist. -->
  <g filter="url(#shadow)">
    <rect x="955" y="215" width="390" height="645" rx="25" fill="#fff" stroke="#00274c" stroke-width="4"/>
    <path d="M980 215h340a25 25 0 0 1 25 25v70H955v-70a25 25 0 0 1 25-25z" fill="url(#navy)"/>
    <text x="1150" y="276" class="panel-title" text-anchor="middle">For each chapter</text>
    <g fill="none" stroke="#00274c" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="1010" cy="365" r="22"/><path d="M998 365l8 8 16-19"/>
      <circle cx="1010" cy="445" r="22"/><path d="M998 445l8 8 16-19"/>
      <circle cx="1010" cy="525" r="22"/><path d="M998 525l8 8 16-19"/>
      <circle cx="1010" cy="605" r="22"/><path d="M998 605l8 8 16-19"/>
      <circle cx="1010" cy="685" r="22"/><path d="M998 685l8 8 16-19"/>
      <circle cx="1010" cy="765" r="22"/><path d="M998 765l8 8 16-19"/>
    </g>
    <g class="item">
      <text x="1050" y="373">Identify decisions</text>
      <text x="1050" y="453">Predict coupling</text>
      <text x="1050" y="533">Reproduce example</text>
      <text x="1050" y="613">Check units &amp; convergence</text>
      <text x="1050" y="693">Explain design change</text>
      <text x="1050" y="773">Test beyond the optimum</text>
    </g>
    <g stroke="#d8dee4" stroke-width="2"><path d="M985 405h330"/><path d="M985 485h330"/><path d="M985 565h330"/><path d="M985 645h330"/><path d="M985 725h330"/></g>
  </g>

  <!-- Final engineering message. -->
  <g filter="url(#shadow)">
    <rect x="125" y="905" width="1150" height="102" rx="22" fill="#fffaf0" stroke="#d69a00" stroke-width="4"/>
    <path d="M195 944h58v19c0 25-13 38-29 38s-29-13-29-38zM180 947h15v10c0 17 9 27 24 30M268 947h-15v10c0 17-9 27-24 30M206 1001h36M213 985v16M235 985v16" fill="none" stroke="#00274c" stroke-width="6" stroke-linejoin="round"/>
    <path d="M224 950l7 13 15 2-11 10 3 15-14-7-14 7 3-15-11-10 15-2z" fill="#00274c"/>
    <text x="730" y="969" class="callout" text-anchor="middle">A converged optimization is only the beginning.</text>
  </g>
</svg>
